services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend
      FRONTEND_PATH: /app/frontend
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    depends_on:
      - redis # app waits for Redis to start first
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine # tiny Alpine-based Redis image
    ports:
      - "6379:6379" # expose for local debugging if needed
    volumes:
      - redis_data:/data # persist rate limit counters across restarts

volumes:
  redis_data:

