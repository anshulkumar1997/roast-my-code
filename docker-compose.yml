services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend
      FRONTEND_PATH: /app/frontend
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Uncomment when you add a database later ──────────────────────
