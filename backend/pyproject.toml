[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
 
[tool.ruff]
line-length = 100
target-version = "py311"
 
[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
 
[tool.ruff.lint.isort]
known-first-party = ["app"]   # tells ruff "app" is our code, not third-party
 
[tool.coverage.run]
source = ["app"]
omit = ["tests/*"]